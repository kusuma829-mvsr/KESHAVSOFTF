<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> KESHAVSOFT</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<nav class="navbar bg-dark navbar-dark px-3">
    <span class="navbar-brand ms-3"> KESHAVSOFT </span>
 <div>
        <a href="index.html" class="btn btn-outline-light me-2">Home</a>
        <a href="about.html" class="btn btn-outline-light me-2">About</a>
        <a href="contact.html" class="btn btn-outline-light">Contact</a>
    </div>
</nav>
</div>
<div class="container mt-4">
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card p-4 bg-primary text-white">
                <h6> Total users</h6>
                <h3 id="userCount">2</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 bg-success text-white">
                    <h6>Revenue</h6>
                    <h3>₹50000</h3>
                </div>
            </div>
            </div>
        </div>
        <div class="card mt-5 p-4">
            <h5> User details</h5>
            <table class="table table-hover mt-3">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th> status</th>
                    </tr>
                </thead>
                <tbody id="userTable">
                    <tr>
                        <td>1</td>
                        <td>Kushi</td>
                        <td>kushi@gmail.com</td>
                        <td><span class="badge bg-success">Active</span></td>
                    </tr>
                    <tr>
                        <td> 2</td>
                        <td>Munendra</td>
                        <td>munendra@gmail.com</td>
                        <td><span class="badge bg-danger">Inactive</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="card mt-4 p-4">
        <h5>Add New User</h5>
        <form id="userForm">
            <div class="row g-2">
                <div class="col-md-4">
                    <input type="text" id="name" class="form-control" placeholder="Enter Name" required>
                </div>
                <div class="col-md-4">
                    <input type="email" id="email" class="form-control" placeholder="Email" required>
                </div>
                <div class="col-md-3">
                    <select id="status" class="form-control">
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                </div>
                <div class="col-md-1">
                    <button class="btn btn-primary w-100">Add ➕</button>
                </div>
            </div>
        </form>
    </div>
</div>
<script>
let id = 3;
document.getElementById("userForm").addEventListener("submit", function(e) {
    e.preventDefault();
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let status = document.getElementById("status").value;
    let row = `
    <tr>
        <td>${id}</td>
        <td>${name}</td>
        <td>${email}</td>
        <td>
            <span class="badge ${status === "Active" ? "bg-success" : "bg-danger"}">
                ${status}
            </span>
        </td>
    </tr>
    `;
    document.getElementById("userTable").innerHTML += row;
    id++;
    document.getElementById("userCount").innerText = id - 1;
    document.getElementById("userForm").reset();
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script> 
</body>
</html>
