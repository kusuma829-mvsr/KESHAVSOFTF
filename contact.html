<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONTACT </title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
.contact-section {
    background: #f8f9fa;
    padding: 50px 20px;
}
.form-box {
    background: white;
    padding: 30px;
    border-radius: 10px;
}
</style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">KESHAVSOFT</span>
    <div>
        <a href="index.html" class="btn btn-outline-light me-2">Home</a>
        <a href="about.html" class="btn btn-outline-light me-2">About</a>
        <a href="contact.html" class="btn btn-outline-light">Contact</a>
    </div>
</nav>
<div class="contact-section">
    <div class="container">
        <div class="row align-items-center g-4">
            <div class="col-md-6">
                <h2>Contact Us</h2>
                <p>Reach out to us anytime</p>

                <p><i class="bi bi-envelope"></i> support@keshavsoft.com</p>
                <p><i class="bi bi-phone"></i> +91 9876543210</p>
            </div>
            <div class="col-md-6">
                <div class="form-box shadow-sm">
                    <form>
                        <div class="mb-3">
                            <input type="text" class="form-control" placeholder="Your Name" required>
                        </div>
                        <div class="mb-3">
                            <input type="email" class="form-control" placeholder="Your Email" required>
                        </div>
                        <div class="mb-3">
                            <textarea class="form-control" rows="4" placeholder="Your Message"></textarea>
                        </div>
                        <button class="btn btn-primary w-100">
                            Send Message
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
